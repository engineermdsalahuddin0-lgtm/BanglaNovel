name: ✅ PR Check

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  check:
    name: 🔍 Build Check on PR
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --frozen-lockfile

      - name: 🔍 Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🏗️ Build
        run: npm run build
        env:
          # PR তে dummy values দিয়ে build check করা হয়
          # (Supabase calls fail হবে, কিন্তু build সফল হলেই যথেষ্ট)
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_key_for_build_check

      - name: ✅ Build Success
        run: echo "Build successful! Ready to merge."
